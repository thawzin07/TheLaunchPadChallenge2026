name: ApplyOS CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: applyos-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify ApplyOS
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ApplyOS
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ApplyOS/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Verify
        run: npm run verify
